<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="vi">

    <!--
    ╔══════════════════════════════════════════════════════════╗
    ║  CUSTOMER LAYOUT - Khung chính của tất cả trang customer ║
    ║                                                          ║
    ║  Cách dùng trong trang customer con:                     ║
    ║  <html layout:decorate="~{customer/layout}">             ║
    ║  <div layout:fragment="body-content"> nội dung </div>    ║
    ║                                                          ║
    ║  Layout tự động gồm: head + navbar + catmenu +           ║
    ║                       content + footer + bootstrap JS    ║
    ╚══════════════════════════════════════════════════════════╝
    -->

    <!-- HEAD: CSS + fonts + biến màu Steam style -->
    <head th:replace="~{customer/fragments/head :: customer-head(${pageTitle})}"></head>

    <body>

        <!-- NAVBAR: logo, search, cart, user -->
        <div th:replace="~{customer/fragments/header :: navbar}"></div>

        <!-- CATEGORY BAR: thanh danh mục ngang -->
        <div th:replace="~{customer/fragments/menu :: catmenu}"></div>

        <!-- MAIN CONTENT: nội dung trang con render vào đây -->
        <div layout:fragment="body-content">
            <!-- Trang con điền nội dung vào đây -->
        </div>

        <!-- FOOTER: links, social, copyright -->
        <div th:replace="~{fragments/footer :: footer}"></div>

        <!-- Bootstrap JS (PHẢI đặt cuối body) -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

        <script>
            // Tự đóng alert sau 4s
            window.addEventListener('DOMContentLoaded', function () {
                setTimeout(() => {
                    document.querySelectorAll('.alert').forEach(el => {
                        try {
                            bootstrap.Alert.getOrCreateInstance(el).close();
                        } catch (e) {
                        }
                    });
                }, 4000);
            });
        </script>
    </body>
</html>
