<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:fragment="customer-head(pageTitle)">
        <!--
        ╔═══════════════════════════════════════════════════════╗
        ║  CUSTOMER HEAD FRAGMENT                               ║
        ║  Phong cách: Dark theme giống Steam + Playtester.io   ║
        ║                                                       ║
        ║  HƯỚNG DẪN CHỈNH SỬA GIAO DIỆN:                      ║
        ║                                                       ║
        ║  ĐỔI MÀU NỀN TRANG:      --bg-body                   ║
        ║  ĐỔI MÀU NỀN NAVBAR:     --bg-nav                    ║
        ║  ĐỔI MÀU ACCENT (link,   --accent                    ║
        ║    nút mua, highlight):                               ║
        ║  ĐỔI MÀU CARD GAME:      --bg-card                   ║
        ║  ĐỔI MÀU TEXT MỜ:        --text-muted                ║
        ║                                                       ║
        ║  SWITCH SANG LIGHT THEME:                             ║
        ║  Đổi các giá trị :root {} bên dưới                   ║
        ╚═══════════════════════════════════════════════════════╝
        -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="${pageTitle != null ? pageTitle + ' | SELLGAME' : 'SELLGAME - Mua game bản quyền'}">
            SELLGAME
        </title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

        <style>
            /*
             * ══════════════════════════════════════════════════════
             *  CUSTOMER STORE CSS
             *  Dark theme default — Steam style
             *
             *  MUỐN CHUYỂN SANG LIGHT THEME?
             *  Sửa các giá trị trong :root {} như sau:
             *    --bg-body:  #f4f6f8
             *    --bg-card:  #ffffff
             *    --bg-nav:   #1a1a2e  (navbar vẫn tối để dễ nhận brand)
             *    --text-main: #1a1a2e
             *    --text-muted: #5a6a7a
             *    --border:   #d1dbe5
             * ══════════════════════════════════════════════════════
             */
            :root {
                /* ── MÀU SẮC CHÍNH ── */
                --accent:        #1a9fff;     /* Màu xanh accent (link, nút, highlight) */
                --accent-hover:  #66c0f4;     /* Màu hover của accent */
                --accent-text:   #acdbf5;     /* Text trên nền tối dùng accent */
                --danger:        #e94560;     /* Màu đỏ (badge sale, lỗi) */

                /* ── NỀN ── */
                --bg-body:       #1b2838;     /* Nền tổng (Steam dark blue) */
                --bg-card:       #16202d;     /* Nền card game */
                --bg-nav:        #171a21;     /* Nền navbar (Steam black) */
                --bg-section:    #1e2a3a;     /* Nền section, panel */

                /* ── TEXT ── */
                --text-main:     #c6d4df;     /* Text chính */
                --text-muted:    #8fa6ba;     /* Text mờ, subtitle */
                --text-white:    #ffffff;

                /* ── BORDER ── */
                --border:        #2a475e;     /* Border chính */

                /* ── GAME SALE BADGE (Steam style) ── */
                --sale-bg:       #4c6b22;     /* Nền badge giảm giá */
                --sale-text:     #a4d007;     /* Text badge giảm giá */
            }

            * {
                font-family: 'Inter', sans-serif;
            }
            body {
                background: var(--bg-body);
                color: var(--text-main);
                min-height: 100vh;
            }

            /* Scrollbar */
            ::-webkit-scrollbar       {
                width: 6px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 3px;
            }

            /* ══ GAME CARD ══════════════════════════════════════ */
            /*
             * Sửa kích thước card:
             *   .game-card-img height → chiều cao ảnh bìa
             * Sửa màu sắc:
             *   background → màu nền card
             *   border-color on hover → màu viền khi hover
             */
            .game-card {
                background: var(--bg-card);
                border: 1px solid var(--border);
                border-radius: 8px;
                overflow: hidden;
                transition: transform .2s, border-color .2s, box-shadow .2s;
                text-decoration: none;
                display: block;
            }
            .game-card:hover {
                transform: translateY(-5px);
                border-color: var(--accent);
                box-shadow: 0 10px 28px rgba(26,159,255,0.18);
            }
            .game-card-img {
                width: 100%;
                height: 160px;      /* ← ĐỔI CHIỀU CAO ẢNH GAME Ở ĐÂY */
                object-fit: cover;
                display: block;
            }
            .game-card-body  {
                padding: 10px 12px 12px;
            }
            .game-card-title {
                font-size: 13px;
                font-weight: 600;
                color: var(--text-white);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                margin-bottom: 3px;
            }
            .game-card-genre {
                font-size: 11px;
                color: var(--text-muted);
                margin-bottom: 8px;
            }
            .game-card-price {
                display: flex;
                align-items: center;
                gap: 5px;
                flex-wrap: wrap;
            }
            .price-original  {
                font-size: 11px;
                color: var(--text-muted);
                text-decoration: line-through;
            }
            .price-sale      {
                font-size: 14px;
                font-weight: 700;
                color: var(--accent-text);
            }
            .price-free      {
                font-size: 14px;
                font-weight: 700;
                color: #a4d007;
            }

            /*
             * Badge % sale: nền xanh lá Steam
             * Đổi màu: sửa --sale-bg và --sale-text trong :root
             */
            .badge-sale {
                background: var(--sale-bg);
                color: var(--sale-text);
                font-size: 11px;
                font-weight: 700;
                padding: 2px 6px;
                border-radius: 3px;
            }

            /* ══ SECTION HEADING ════════════════════════════════ */
            .section-heading {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 14px;
            }
            .section-heading h5 {
                font-size: 16px;
                font-weight: 700;
                color: var(--text-white);
                margin: 0;
            }
            .see-all {
                font-size: 13px;
                color: var(--accent);
                text-decoration: none;
            }
            .see-all:hover {
                color: var(--accent-hover);
            }

            /* ══ MAIN WRAPPER ═══════════════════════════════════ */
            .main-wrapper {
                max-width: 1200px;
                margin: 0 auto;
                padding: 24px 16px;
            }
        </style>
    </head>
</html>
