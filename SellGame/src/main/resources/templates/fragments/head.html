<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  SHARED HEAD FRAGMENT                                        ║
    ║  Dùng chung cho cả admin và customer                        ║
    ║                                                              ║
    ║  Cách dùng trong layout:                                     ║
    ║  <head th:replace="~{fragments/head :: head('Tiêu đề')}">   ║
    ║                                                              ║
    ║  ĐỔI FONT: sửa link Google Fonts bên dưới                   ║
    ║  ĐỔI ICON: thay Bootstrap Icons CDN bằng Font Awesome        ║
    ╚══════════════════════════════════════════════════════════════╝
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SELLGAME - Mua bán game bản quyền uy tín">
    <title th:text="${pageTitle != null ? pageTitle + ' | SELLGAME' : 'SELLGAME'}">SELLGAME</title>

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons 1.11 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!--
        FONT: Inter (clean, modern)
        Muốn đổi font → thay 'Inter' bên dưới và trong CSS
        Gợi ý: 'Rajdhani' cho game vibe, 'Outfit' cho clean modern
    -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS dùng chung (biến màu, utilities) -->
    <style>
        /*
         * ══════════════════════════════════════════════════════
         *  CSS VARIABLES DÙNG CHUNG
         *  Sửa ở đây để thay đổi màu sắc toàn trang
         * ══════════════════════════════════════════════════════
         *
         *  DARK THEME (mặc định): màu xanh đậm như Steam
         *  LIGHT THEME: override bằng [data-theme="light"]
         *
         *  Muốn đổi màu accent (xanh lam): sửa --accent
         *  Muốn đổi màu nền:               sửa --bg-body
         *  Muốn đổi font toàn trang:       sửa font-family trong *
         */

        /* ── Dark theme (default) ── */
        :root,
        [data-theme="dark"] {
            --accent:        #1a9fff;
            --accent-hover:  #66c0f4;
            --accent-text:   #acdbf5;

            --bg-body:       #1b2838;
            --bg-card:       #16202d;
            --bg-nav:        #171a21;
            --bg-sidebar:    #1a1a2e;
            --bg-section:    #1e2a3a;
            --bg-input:      rgba(255,255,255,0.07);

            --text-main:     #c6d4df;
            --text-muted:    #8fa6ba;
            --text-white:    #ffffff;

            --border:        #2a475e;
            --border-light:  rgba(255,255,255,0.08);

            --sale-bg:       #4c6b22;
            --sale-text:     #a4d007;

            --danger:        #e94560;
        }

        /* ── Light theme ── */
        [data-theme="light"] {
            --accent:        #0a7abf;
            --accent-hover:  #0d94e8;
            --accent-text:   #0a7abf;

            --bg-body:       #f4f6f8;
            --bg-card:       #ffffff;
            --bg-nav:        #1a1a2e;  /* navbar vẫn tối để nhận dạng brand */
            --bg-sidebar:    #1a1a2e;
            --bg-section:    #eef1f4;
            --bg-input:      #ffffff;

            --text-main:     #1a1a2e;
            --text-muted:    #5a6a7a;
            --text-white:    #ffffff;

            --border:        #d1dbe5;
            --border-light:  rgba(0,0,0,0.08);

            --sale-bg:       #d4edda;
            --sale-text:     #155724;

            --danger:        #dc3545;
        }

        /* ── Base styles ── */
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* ── Scrollbar custom (chỉ Webkit) ── */
        ::-webkit-scrollbar       { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ── Utility classes ── */
        .text-accent  { color: var(--accent) !important; }
        .bg-card-game { background: var(--bg-card); }
        .border-game  { border-color: var(--border) !important; }

        /* ── Theme toggle button ── */
        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 50%;
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
</html>
