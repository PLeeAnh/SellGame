<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title">📊 Dashboard Admin</h3>
                    <p class="card-text">Chào mừng bạn đến với trang quản trị SELLGAME!</p>
                    <hr>
                    <div class="row mt-4">
                        <div class="col-md-3">
                            <div class="card bg-primary text-white">
                                <div class="card-body">
                                    <h5 class="card-title">Số danh mục</h5>
                                    <h2 class="mb-0" th:text="${soDanhMuc}">0</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card bg-success text-white">
                                <div class="card-body">
                                    <h5 class="card-title">Số game</h5>
                                    <h2 class="mb-0" th:text="${soGame}">0</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card bg-info text-white">
                                <div class="card-body">
                                    <h5 class="card-title">Số đơn hàng</h5>
                                    <h2 class="mb-0" th:text="${soHoaDon}">0</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card bg-warning text-white">
                                <div class="card-body">
                                    <h5 class="card-title">Doanh thu</h5>
                                    <h2 class="mb-0" th:text="${doanhThu}">0</h2>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
