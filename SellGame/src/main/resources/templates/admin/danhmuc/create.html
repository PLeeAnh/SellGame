<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm danh mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>➕ Thêm danh mục mới</h2>
    <form th:action="@{/admin/danh-muc/create}" th:object="${danhMuc}" method="post">
        <div class="mb-3">
            <label class="form-label">Tên danh mục</label>
            <input type="text" th:field="*{tenDanhMuc}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Slug (URL)</label>
            <input type="text" th:field="*{slug}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Mô tả</label>
            <textarea th:field="*{moTa}" class="form-control" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-success">💾 Lưu</button>
        <a th:href="@{/admin/danh-muc}" class="btn btn-secondary">⬅️ Quay lại</a>
    </form>
</div>
</body>
</html>
