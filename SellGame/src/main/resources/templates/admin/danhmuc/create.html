<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <div th:fragment="content">

        <div class="d-flex align-items-center gap-3 mb-4">
            <a th:href="@{/admin/danhmuc}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
            <h5 class="mb-0 fw-bold"><i class="bi bi-plus-circle me-2 text-primary"></i>Thêm danh mục mới</h5>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card" style="max-width:600px">
            <div class="card-body">
                <form th:action="@{/admin/danhmuc/create}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tên danh mục <span class="text-danger">*</span></label>
                        <input type="text" name="tenDanhMuc" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Slug (URL)</label>
                        <input type="text" name="slug" class="form-control">
                        <small class="text-muted">Để trống tự động tạo từ tên</small>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Mô tả</label>
                        <textarea name="moTa" class="form-control" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i> Thêm danh mục</button>
                    <a th:href="@{/admin/danhmuc}" class="btn btn-secondary ms-2">Hủy</a>
                </form>
            </div>
        </div>
    </div>
</html>
