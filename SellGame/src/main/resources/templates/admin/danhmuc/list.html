<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý danh mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>📁 Quản lý danh mục</h2>
    <a th:href="@{/admin/danh-muc/create}" class="btn btn-primary mb-3">➕ Thêm danh mục</a>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên danh mục</th>
                <th>Slug</th>
                <th>Mô tả</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="dm : ${danhSach}">
                <td th:text="${dm.id}"></td>
                <td th:text="${dm.tenDanhMuc}"></td>
                <td th:text="${dm.slug}"></td>
                <td th:text="${dm.moTa}"></td>
                <td>
                    <a th:href="@{/admin/danh-muc/edit/{id}(id=${dm.id})}" class="btn btn-sm btn-warning">✏️ Sửa</a>
                    <a th:href="@{/admin/danh-muc/delete/{id}(id=${dm.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Xóa danh mục này?')">🗑️ Xóa</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
