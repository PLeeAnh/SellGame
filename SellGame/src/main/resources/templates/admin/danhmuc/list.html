<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <div th:fragment="content">

        <!-- Thông báo -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold mb-0"><i class="bi bi-grid-3x3-gap me-2 text-primary"></i>Quản lý danh mục</h5>
            <a th:href="@{/admin/danhmuc/create}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i> Thêm danh mục</a>
        </div>

        <!-- Bảng danh sách -->
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-bordered align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th style="width:50px">#</th>
                                <th>Tên danh mục</th>
                                <th>Slug</th>
                                <th>Mô tả</th>
                                <th style="width:120px" class="text-center">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(danhMucList)}">
                                <td colspan="5" class="text-center py-5">
                                    <i class="bi bi-inbox fs-1 d-block mb-2 opacity-25"></i>
                                    Chưa có danh mục nào
                                </td>
                            </tr>
                            <tr th:each="dm, stat : ${danhMucList}">
                                <td class="text-center" th:text="${stat.count}"></td>
                                <td th:text="${dm.tenDanhMuc}"></td>
                                <td><code th:text="${dm.slug}"></code></td>
                                <td th:text="${dm.moTa != null ? dm.moTa : '—'}"></td>
                                <td class="text-center">
                                    <a th:href="@{/admin/danhmuc/edit/{id}(id=${dm.id})}" class="btn btn-sm btn-outline-warning"><i class="bi bi-pencil"></i> Sửa</a>
                                    <a th:href="@{/admin/danhmuc/delete/{id}(id=${dm.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Xóa danh mục này?')"><i class="bi bi-trash"></i> Xóa</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</html>
