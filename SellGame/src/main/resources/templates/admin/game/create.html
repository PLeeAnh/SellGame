<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sửa game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>✏️ Sửa game</h2>
    <form th:action="@{/admin/game/edit/{id}(id=${game.id})}" th:object="${game}" method="post" enctype="multipart/form-data">
        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label">Tên game</label>
                    <input type="text" th:field="*{tenGame}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Danh mục</label>
                    <select th:field="*{danhMuc.id}" class="form-control">
                        <option th:each="dm : ${danhSachDanhMuc}" th:value="${dm.id}" th:text="${dm.tenDanhMuc}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Nhà phát hành</label>
                    <input type="text" th:field="*{nhaPhatHanh}" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Ngày phát hành</label>
                    <input type="date" th:field="*{ngayPhatHanh}" class="form-control">
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label">Giá gốc (USD)</label>
                    <input type="number" th:field="*{giaGoc}" class="form-control" step="0.01">
                </div>
                <div class="mb-3">
                    <label class="form-label">Giá bán (VND)</label>
                    <input type="number" th:field="*{giaVnd}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Ảnh hiện tại</label><br>
                    <img th:src="@{${game.anhBia}}" width="100" height="100" style="object-fit:cover">
                    <input type="file" name="fileAnhBia" class="form-control mt-2">
                    <small class="text-muted">Để trống nếu không muốn đổi ảnh</small>
                </div>
                <div class="mb-3">
                    <label class="form-label">Link download</label>
                    <input type="text" th:field="*{linkDownload}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Trạng thái</label>
                    <select th:field="*{trangThai}" class="form-control">
                        <option value="ON_SALE">Đang bán</option>
                        <option value="HIDDEN">Ẩn</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Mô tả ngắn</label>
            <textarea th:field="*{moTaNgan}" class="form-control" rows="2"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Mô tả chi tiết</label>
            <textarea th:field="*{moTaChiTiet}" class="form-control" rows="4"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">💾 Cập nhật</button>
        <a th:href="@{/admin/game}" class="btn btn-secondary">⬅️ Quay lại</a>
    </form>
</div>
</body>
</html>
