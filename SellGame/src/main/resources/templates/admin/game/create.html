<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <div th:fragment="content">

        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb" style="font-size:13px;">
                <li class="breadcrumb-item"><a th:href="@{/admin/game}">Quản lý game</a></li>
                <li class="breadcrumb-item active">Thêm game mới</li>
            </ol>
        </nav>

        <div class="d-flex align-items-center gap-3 mb-4">
            <a th:href="@{/admin/game}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
            <h5 class="mb-0 fw-bold"><i class="bi bi-plus-circle me-2 text-primary"></i>Thêm game mới</h5>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="@{/admin/game/create}" method="post" enctype="multipart/form-data">
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="card mb-4">
                        <div class="card-header"><i class="bi bi-info-circle me-2"></i>Thông tin cơ bản</div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Tên game <span class="text-danger">*</span></label>
                                <input type="text" name="tenGame" class="form-control form-control-lg" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mô tả game</label>
                                <textarea name="moTa" class="form-control" rows="5"></textarea>
                            </div>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Nhà phát hành</label>
                                    <input type="text" name="nhaPhatHanh" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Ngày phát hành</label>
                                    <input type="date" name="ngayPhatHanh" class="form-control">
                                </div>
                            </div>
                            <div class="mt-3">
                                <label class="form-label fw-semibold">Thể loại</label>
                                <input type="text" name="theLoai" class="form-control" placeholder="Ví dụ: RPG, Hành động">
                            </div>
                        </div>
                    </div>

                    <div class="card mb-4">
                        <div class="card-header"><i class="bi bi-pc-display me-2"></i>Yêu cầu hệ thống</div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label">Cấu hình tối thiểu</label>
                                <textarea name="yeuCauToiThieu" class="form-control" rows="3"></textarea>
                            </div>
                            <div>
                                <label class="form-label">Cấu hình đề xuất</label>
                                <textarea name="yeuCauDeXuat" class="form-control" rows="3"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header"><i class="bi bi-download me-2"></i>Thông tin tải về</div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Dung lượng</label>
                                    <div class="input-group"><input type="text" name="dungLuong" class="form-control"><span class="input-group-text">GB</span></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Phiên bản</label>
                                    <input type="text" name="phienBan" class="form-control">
                                </div>
                            </div>
                            <div class="mt-3">
                                <label class="form-label">Link tải game <span class="text-danger">*</span></label>
                                <input type="text" name="linkDownload" class="form-control" required>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <!-- Ảnh bìa -->
                    <div class="card mb-4">
                        <div class="card-header"><i class="bi bi-image me-2"></i>Ảnh bìa game</div>
                        <div class="card-body">
                            <div class="mb-3 text-center">
                                <img id="imgPreview" src="/images/no-image.jpg" class="img-fluid rounded" style="width:100%; height:200px; object-fit:cover; border:2px dashed #dee2e6; cursor:pointer;" onclick="document.getElementById('anhBiaFile').click()">
                            </div>
                            <input type="file" id="anhBiaFile" name="anhBiaFile" accept="image/*" class="form-control" onchange="previewAnh(this)">
                            <div class="form-text mt-1">JPG, PNG, WebP. Tối đa 10MB. Kích thước đề nghị 460×215px.</div>
                        </div>
                    </div>

                    <!-- Phân loại -->
                    <div class="card mb-4">
                        <div class="card-header"><i class="bi bi-tag me-2"></i>Phân loại</div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Danh mục <span class="text-danger">*</span></label>
                                <select name="idDanhMuc" class="form-select" required>
                                    <option value="">-- Chọn danh mục --</option>
                                    <option th:each="dm : ${danhMucList}" th:value="${dm.id}" th:text="${dm.tenDanhMuc}"></option>
                                </select>
                            </div>
                            <div>
                                <label class="form-label fw-semibold">Trạng thái</label>
                                <select name="trangThai" class="form-select">
                                    <option value="ACTIVE">🟢 Đang bán</option>
                                    <option value="COMING_SOON">🔵 Sắp ra mắt</option>
                                    <option value="INACTIVE">🔴 Ẩn</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Giá cả -->
                    <div class="card">
                        <div class="card-header"><i class="bi bi-currency-dollar me-2"></i>Giá cả</div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label">Giá gốc (USD)</label>
                                <div class="input-group"><span class="input-group-text">$</span><input type="number" name="giaGoc" class="form-control" step="0.01" min="0"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Giá bán (VNĐ) <span class="text-danger">*</span></label>
                                <div class="input-group"><input type="number" name="giaVnd" id="giaVndInput" class="form-control" min="0" required oninput="tinhGiaGiam()"><span class="input-group-text">₫</span></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Giảm giá (%)</label>
                                <div class="input-group"><input type="number" name="phanTramGiam" id="phanTramInput" class="form-control" min="0" max="100" oninput="tinhGiaGiam(); document.getElementById('badgePhanTram').textContent=this.value+'%'"><span class="input-group-text">%</span></div>
                                <span class="badge bg-danger mt-1" id="badgePhanTram">0%</span>
                            </div>
                            <div>
                                <label class="form-label">Giá sau giảm (VNĐ)</label>
                                <div class="input-group"><input type="number" name="giaGiam" id="giaGiamInput" class="form-control bg-light"><span class="input-group-text">₫</span></div>
                                <div class="form-text">Tự động tính từ % giảm</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-4 d-flex gap-3">
                <button type="submit" class="btn btn-primary btn-lg px-5"><i class="bi bi-plus-circle me-2"></i>Thêm game</button>
                <a th:href="@{/admin/game}" class="btn btn-outline-secondary btn-lg">Hủy</a>
            </div>
        </form>

        <script>
            function previewAnh(input) {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = e => document.getElementById('imgPreview').src = e.target.result;
                    reader.readAsDataURL(input.files[0]);
                }
            }
            function tinhGiaGiam() {
                const gia = parseFloat(document.getElementById('giaVndInput').value) || 0;
                const pct = parseFloat(document.getElementById('phanTramInput').value) || 0;
                if (pct > 0 && gia > 0)
                    document.getElementById('giaGiamInput').value = Math.round(gia * (1 - pct / 100));
                else
                    document.getElementById('giaGiamInput').value = '';
            }
        </script>
    </div>
</html>
