<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>🎮 Quản lý game</h2>
    <a th:href="@{/admin/game/create}" class="btn btn-primary mb-3">➕ Thêm game</a>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Ảnh</th>
                <th>Tên game</th>
                <th>Danh mục</th>
                <th>Giá (VND)</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="g : ${danhSach}">
                <td th:text="${g.id}"></td>
                <td><img th:src="@{${g.anhBia}}" width="50" height="50" style="object-fit:cover"></td>
                <td th:text="${g.tenGame}"></td>
                <td th:text="${g.danhMuc.tenDanhMuc}"></td>
                <td th:text="${#numbers.formatDecimal(g.giaVnd, 0, 'COMMA')}"></td>
                <td>
                    <span th:if="${g.trangThai == 'ON_SALE'}" class="badge bg-success">Đang bán</span>
                    <span th:if="${g.trangThai == 'HIDDEN'}" class="badge bg-secondary">Ẩn</span>
                </td>
                <td>
                    <a th:href="@{/admin/game/edit/{id}(id=${g.id})}" class="btn btn-sm btn-warning">✏️ Sửa</a>
                    <a th:href="@{/admin/game/delete/{id}(id=${g.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Xóa game này?')">🗑️ Xóa</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
