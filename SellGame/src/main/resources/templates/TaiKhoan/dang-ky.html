<div th:fragment="content">
    <div class="row justify-content-center mt-4">
        <div class="col-md-6">
            <div class="card shadow border-top border-success border-4">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4 text-success fw-bold">ĐĂNG KÝ TÀI KHOẢN</h3>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <form th:action="@{/dang-ky}" method="post" onsubmit="return validateForm()">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Họ và Tên</label>
                            <input type="text" name="hoTen" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mật khẩu</label>
                            <input type="password" name="matKhau" id="matKhau" class="form-control" required minlength="6">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Xác nhận mật khẩu</label>
                            <input type="password" id="xacNhanMatKhau" class="form-control" required>
                            <div id="passwordError" class="text-danger mt-1" style="display:none;">Mật khẩu không khớp!</div>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fs-5 mt-2">Đăng Ký</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script>
        function validateForm() {
            if (document.getElementById("matKhau").value !== document.getElementById("xacNhanMatKhau").value) {
                document.getElementById("passwordError").style.display = "block"; return false;
            } return true;
        }
    </script>
</div>
