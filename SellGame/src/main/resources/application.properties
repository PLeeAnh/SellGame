spring.application.name=SELLGAME

# ========== SQL SERVER ==========
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SELLGAME;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=1234
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ========== JPA ==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ========== TI\u1ebeNG VI\u1ec6T - FIX L\u1ed6I PH\u00d4NG CH\u1eee ==========
# \u0110\u00e2y l\u00e0 c\u00e1ch \u0111\u00fang trong Spring Boot 3.x (spring.http.encoding \u0111\u00e3 b\u1ecb deprecated)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true
spring.web.resources.charset=UTF-8

# ========== THYMELEAF ==========
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# ========== UPLOAD FILE ==========
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Th\u01b0 m\u1ee5c l\u01b0u \u1ea3nh upload (\u0111\u1ecdc t\u1eeb th\u01b0 m\u1ee5c ngo\u00e0i jar)
# Khi ch\u1ea1y t\u1eeb NetBeans: th\u01b0 m\u1ee5c uploads/ n\u1eb1m trong project root
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# ========== SERVER ==========
server.tomcat.connection-timeout=20000
