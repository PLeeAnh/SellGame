spring.application.name=SELLGAME

# C\u1ea4U H\u00ccNH K\u1ebeT N\u1ed0I SQL SERVER
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SELLGAME;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=1234
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# C\u1ea4U H\u00ccNH JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# C\u1ea4U H\u00ccNH FIX L\u1ed6I FONT TI\u1ebeNG VI\u1ec6T
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
# \u00c9p Spring Boot s\u1eed d\u1ee5ng ch\u00ednh x\u00e1c t\u00ean b\u1ea3ng b\u1ea1n vi\u1ebft trong Java, KH\u00d4NG t\u1ef1 \u0111\u1ed5i th\u00e0nh ch\u1eef th\u01b0\u1eddng
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl